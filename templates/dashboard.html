<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="dashboard.css" />
    <script src="dashboard.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureBot Dashboard</title>
  </head>
  <body>
    <header>
      <div id="dot"></div>
      <h1>SecureBot — Live Dashboard</h1>
      <span id="ts"></span>
    </header>

    <div class="grid">
      <!-- Accelerometer -->
      <div class="card">
        <h2>Accelerometer (m/s²)</h2>
        <div class="metric">
          <span class="label">X</span><span class="value" id="ax">—</span>
        </div>
        <div class="metric">
          <span class="label">Y</span><span class="value" id="ay">—</span>
        </div>
        <div class="metric">
          <span class="label">Z</span><span class="value" id="az">—</span>
        </div>
        <canvas id="accel-chart"></canvas>
      </div>

      <!-- Gyroscope -->
      <div class="card">
        <h2>Gyroscope (rad/s)</h2>
        <div class="metric">
          <span class="label">X</span><span class="value" id="gx">—</span>
        </div>
        <div class="metric">
          <span class="label">Y</span><span class="value" id="gy">—</span>
        </div>
        <div class="metric">
          <span class="label">Z</span><span class="value" id="gz">—</span>
        </div>
        <canvas id="gyro-chart"></canvas>
      </div>

      <!-- Status -->
      <div class="card">
        <h2>Status</h2>
        <div class="metric">
          <span class="label">Tamper Flag</span>
          <span class="value ok" id="tamper">CLEAR</span>
        </div>
        <div class="metric">
          <span class="label">Total Alerts</span>
          <span class="value" id="alert-count">0</span>
        </div>
        <div class="metric">
          <span class="label">Frames Received</span>
          <span class="value" id="frames">0</span>
        </div>
      </div>

      <!-- Alerts -->
      <div class="card" style="grid-column: 1 / -1">
        <h2>Tamper Alert History</h2>
        <div id="alert-list"><span class="none">No alerts yet.</span></div>
      </div>
    </div>

    <div id="health">Connecting to broker…</div>
  </body>
</html>
